<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国生物多样性地图</title>
    <style>
        :root {
            --primary: #2D5A27;
            --secondary: #8FBC8F;
            --accent: #F4A460;
            --background: #F5F5DC;
            --text: #333333;
            --text-light: #666666;
            --white: #FFFFFF;
            --shadow: rgba(45, 90, 39, 0.2);
            --hover-bg: rgba(45, 90, 39, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", "Noto Sans SC", Arial, sans-serif;
            background: var(--background);
            color: var(--text);
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .map-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            position: relative;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-family: "STSong", "SimSun", "Noto Serif SC", serif;
            font-size: 2.2rem;
            color: var(--primary);
            margin-bottom: 8px;
            letter-spacing: 4px;
        }

        .header p {
            color: var(--text-light);
            font-size: 0.95rem;
        }

        .map-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .china-map {
            width: 100%;
            max-width: 960px;
            height: auto;
            filter: drop-shadow(0 4px 20px var(--shadow));
            background:
                radial-gradient(ellipse at 50% 35%, rgba(143,188,143,0.12), transparent 70%);
            border-radius: 12px;
        }

        .china-map path {
            fill: var(--secondary);
            stroke: var(--white);
            stroke-width: 0.8;
            stroke-linejoin: round;
            cursor: pointer;
            transition: fill 0.25s ease, stroke-width 0.25s ease, filter 0.25s ease;
        }

        .china-map path:hover {
            fill: var(--primary);
            stroke-width: 1.8;
            filter: brightness(1.05) drop-shadow(0 0 4px rgba(22,92,46,0.4));
        }

        .china-map path.active {
            fill: var(--primary);
            stroke: var(--accent);
            stroke-width: 2.4;
            filter: drop-shadow(0 0 10px rgba(244,164,96,0.75)) drop-shadow(0 0 3px rgba(255,140,0,0.9));
        }

        .china-map path.disabled {
            fill: #d6d6d6;
            pointer-events: none;
            opacity: 0.55;
        }

        .map-legend {
            position: absolute;
            right: 24px;
            bottom: 24px;
            background: rgba(255,255,255,0.85);
            border: 1px solid rgba(45,90,39,0.15);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.78rem;
            color: var(--text-light);
            backdrop-filter: blur(4px);
            line-height: 1.6;
            z-index: 5;
        }
        .map-legend .legend-title {
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 4px;
            font-size: 0.82rem;
        }
        .map-legend .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .map-legend .legend-swatch {
            width: 16px;
            height: 10px;
            border-radius: 2px;
            border: 1px solid rgba(0,0,0,0.08);
            flex-shrink: 0;
        }
        .map-legend .swatch-default { background: var(--secondary); }
        .map-legend .swatch-active {
            background: var(--accent);
            border-color: rgba(244,164,96,0.6);
        }
        .map-legend .swatch-disabled { background: #d6d6d6; }
        @media (max-width: 768px) {
            .map-legend {
                right: 12px;
                bottom: 12px;
                padding: 8px 10px;
                font-size: 0.7rem;
            }
        }

        .tooltip {
            position: absolute;
            background: var(--white);
            padding: 8px 16px;
            border-radius: 8px;
            box-shadow: 0 4px 15px var(--shadow);
            font-size: 0.9rem;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
            z-index: 100;
            border-left: 3px solid var(--primary);
        }

        .tooltip.visible {
            opacity: 1;
        }

        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 24px;
            border: 2px solid var(--primary);
            background: var(--white);
            color: var(--primary);
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .filter-btn:hover {
            background: var(--hover-bg);
        }

        .filter-btn.active {
            background: var(--primary);
            color: var(--white);
        }

        .detail-panel {
            width: 400px;
            background: var(--white);
            box-shadow: -5px 0 30px var(--shadow);
            transform: translateX(100%);
            transition: transform 0.3s ease-out;
            overflow-y: auto;
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            z-index: 800;
        }

        .detail-panel.open {
            transform: translateX(0);
        }

        .panel-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: var(--white);
            padding: 24px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .panel-header h2 {
            font-family: "STSong", "SimSun", "Noto Serif SC", serif;
            font-size: 1.6rem;
            margin-bottom: 8px;
        }

        .panel-header p {
            font-size: 0.85rem;
            opacity: 0.9;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 32px;
            height: 32px;
            border: none;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .close-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .close-btn svg {
            width: 16px;
            height: 16px;
            stroke: var(--white);
        }

        .panel-content {
            padding: 20px;
        }

        .section {
            margin-bottom: 24px;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--primary);
            margin-bottom: 14px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--hover-bg);
        }

        .section-title svg {
            width: 20px;
            height: 20px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .card {
            background: var(--background);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: default;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px var(--shadow);
        }

        .card-image {
            width: 100%;
            height: 90px;
            object-fit: cover;
            background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
        }

        .card-info {
            padding: 12px;
        }

        .card-info h4 {
            font-size: 0.95rem;
            color: var(--text);
            margin-bottom: 4px;
        }

        .card-info p {
            font-size: 0.75rem;
            color: var(--text-light);
            line-height: 1.4;
        }

        .geo-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .geo-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px;
            background: var(--background);
            border-radius: 10px;
        }

        .geo-icon {
            width: 36px;
            height: 36px;
            background: var(--primary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .geo-icon svg {
            width: 20px;
            height: 20px;
            stroke: var(--white);
        }

        .geo-text h4 {
            font-size: 0.9rem;
            margin-bottom: 2px;
        }

        .geo-text p {
            font-size: 0.75rem;
            color: var(--text-light);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            stroke: var(--secondary);
            margin-bottom: 16px;
        }

        .empty-state h3 {
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: var(--text);
        }

        .intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .intro-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .intro-box {
            background: var(--white);
            padding: 40px;
            border-radius: 20px;
            max-width: 500px;
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .intro-overlay.visible .intro-box {
            transform: scale(1);
        }

        .intro-box h2 {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.8rem;
            color: var(--primary);
            margin-bottom: 16px;
        }

        .intro-box p {
            color: var(--text-light);
            line-height: 1.7;
            margin-bottom: 24px;
        }

        .intro-btn {
            padding: 14px 40px;
            background: var(--primary);
            color: var(--white);
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.2s ease;
        }

        .intro-btn:hover {
            background: var(--secondary);
            transform: scale(1.05);
        }

        @media (max-width: 1024px) {
            .detail-panel {
                width: 350px;
            }
        }

        @media (max-width: 768px) {
            body {
                overflow: auto;
            }
            .container {
                flex-direction: column;
                height: auto;
                min-height: 100vh;
            }
            .map-section {
                flex: none;
                min-height: 62vh;
                height: auto;
                padding: 16px 12px;
            }
            .header h1 {
                font-size: 1.6rem;
                letter-spacing: 2px;
            }
            .china-map {
                max-height: 52vh;
            }
            .detail-panel {
                position: static;
                width: 100%;
                min-height: 38vh;
                max-height: none;
                transform: translateY(0);
                box-shadow: 0 -5px 24px var(--shadow);
            }
            .detail-panel.open {
                transform: translateY(0);
            }
            .card-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .filter-btn {
                padding: 8px 16px;
                font-size: 0.85rem;
            }
        }

        @media (max-width: 480px) {
            .card-grid {
                grid-template-columns: 1fr;
            }
            .intro-box {
                margin: 16px;
                padding: 28px 22px;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-in {
            animation: fadeInUp 0.5s ease forwards;
        }

        /* 返回首页按钮 */
        .back-home-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #2D5A27 0%, #3A6B32 100%);
            color: #F5F5DC;
            text-decoration: none;
            border-radius: 24px;
            font-size: 0.95rem;
            font-weight: 600;
            z-index: 9999;
            box-shadow: 0 4px 16px rgba(45, 90, 39, 0.35);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid rgba(245, 245, 220, 0.2);
        }
        .back-home-btn:hover {
            background: linear-gradient(135deg, #3A6B32 0%, #4A7B42 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(45, 90, 39, 0.45);
        }
        .back-home-btn:active {
            transform: translateY(0);
        }

        /* 响应式 - 移动端 */
        @media (max-width: 768px) {
            .back-home-btn {
                top: 12px;
                left: 12px;
                padding: 8px 14px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-home-btn">← 返回首页</a>
    <div class="intro-overlay visible" id="introOverlay">
        <div class="intro-box">
            <h2>中国生物多样性地图</h2>
            <p>点击地图上的各个省份，探索当地的珍稀动植物资源与生态地貌特征，了解中国丰富的生物多样性。</p>
            <button class="intro-btn" onclick="closeIntro()">开始探索</button>
        </div>
    </div>

        let currentProvince = null;
        let currentFilter = 'all';

        function closeIntro() {
            document.getElementById('introOverlay').classList.remove('visible');
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.filter === filter);
            });
            if (currentProvince) {
                renderProvinceData(currentProvince);
            }
        }

        function openPanel(provinceName) {
            const panel = document.getElementById('detailPanel');
            panel.classList.add('open');
            currentProvince = provinceName;
            document.getElementById('provinceName').textContent = provinceName;
            
            if (provinceData[provinceName]) {
                document.getElementById('provinceIntro').textContent = provinceData[provinceName].intro;
                renderProvinceData(provinceName);
            } else {
                document.getElementById('provinceIntro').textContent = '暂无该省份的详细数据';
                document.getElementById('panelContent').innerHTML = '<div class="empty-state"><p>正在建设中...</p></div>';
            }
        }

        function renderProvinceData(provinceName) {
            const data = provinceData[provinceName];
            if (!data) return;

            const content = document.getElementById('panelContent');
            let html = '';

            if (currentFilter === 'all' || currentFilter === 'animal') {
                html += createCardSection('保护动物', '🐾', data.animals.map(a => `
                    <div class="card">
                        <div class="card-image">${a.emoji}</div>
                        <div class="card-info">
                            <h4>${a.name}</h4>
                            <p>${a.desc}</p>
                        </div>
                    </div>
                `).join(''));
            }

            if (currentFilter === 'all' || currentFilter === 'plant') {
                html += createCardSection('保护植物', '🌿', data.plants.map(p => `
                    <div class="card">
                        <div class="card-image">${p.emoji}</div>
                        <div class="card-info">
                            <h4>${p.name}</h4>
                            <p>${p.desc}</p>
                        </div>
                    </div>
                `).join(''));
            }

            if (currentFilter === 'all' || currentFilter === 'geo') {
                html += createListSection('生态地貌', '🏔️', data.geography.map(g => `
                    <div class="geo-item">
                        <div class="geo-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                                <path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z"/>
                                <circle cx="12" cy="10" r="3"/>
                            </svg>
                        </div>
                        <div class="geo-text">
                            <h4>${g.name}</h4>
                            <p>${g.desc}</p>
                        </div>
                    </div>
                `).join(''));
            }

            content.innerHTML = html || `
                <div class="empty-state">
                    <h3>暂无内容</h3>
                    <p>当前筛选条件下没有可展示的信息。</p>
                </div>
            `;
        }

        function createCardSection(title, icon, content) {
            return `
                <div class="section animate-in">
                    <h3 class="section-title">${icon} ${title}</h3>
                    <div class="card-grid">${content}</div>
                </div>
            `;
        }

        function createListSection(title, icon, content) {
            return `
                <div class="section animate-in">
                    <h3 class="section-title">${icon} ${title}</h3>
                    <div class="geo-list">${content}</div>
                </div>
            `;
        }

        function closePanel() {
            document.getElementById('detailPanel').classList.remove('open');
            currentProvince = null;
            document.querySelectorAll('.china-map path.active').forEach(p => p.classList.remove('active'));
        }

        const map = document.getElementById('chinaMap');
        const tooltip = document.getElementById('tooltip');

        map.querySelectorAll('path').forEach(path => {
            path.addEventListener('mouseenter', (e) => {
                const name = path.dataset.name;
                tooltip.textContent = name;
                tooltip.classList.add('visible');
                // 悬停省份也置顶显示（如果当前没有选中省份）
                if (!document.querySelector('.china-map path.active')) {
                    map.appendChild(path);
                }
            });

            path.addEventListener('mousemove', (e) => {
                tooltip.style.left = e.pageX + 15 + 'px';
                tooltip.style.top = e.pageY - 10 + 'px';
            });

            path.addEventListener('mouseleave', () => {
                tooltip.classList.remove('visible');
            });

            path.addEventListener('click', () => {
                map.querySelectorAll('path').forEach(p => p.classList.remove('active'));
                path.classList.add('active');
                // 将选中省份移到 SVG 绘制顺序的最顶层，避免被其他省份遮挡
                map.appendChild(path);
                openPanel(path.dataset.name);
            });

            path.setAttribute('tabindex', '0');
            path.setAttribute('role', 'button');
            path.setAttribute('aria-label', `查看${path.dataset.name}生物多样性信息`);
            path.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    path.dispatchEvent(new MouseEvent('click', { bubbles: true }));
                }
            });
        });

        document.addEventListener('click', (e) => {
            if (
                !e.target.closest('.detail-panel') &&
                !e.target.closest('.china-map') &&
                !e.target.closest('.filter-bar') &&
                !e.target.closest('.intro-overlay')
            ) {
                closePanel();
            }
        });
    </script>
